version: '3.8'

services:
  agent-orchestration:
    build: .
    container_name: agent-orchestration
    ports:
      - "8002:8002"  # API
      - "9002:9002"  # Prometheus metrics
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/agent_orchestration
      - REDIS_URL=redis://redis:6379/2
      - CONTEXT_MGMT_URL=http://context-management:8000
      - RAG_SERVICE_URL=http://rag:8001
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - agent-network
      - aegisops-shared

  postgres:
    image: pgvector/pgvector:pg15
    container_name: agent-orchestration-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agent_orchestration
    # Host port 5434 maps to Postgres in the container (5432). From the host use:
    # postgresql://postgres:postgres@localhost:5434/agent_orchestration
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - agent-network
      - aegisops-shared

  redis:
    image: redis:7-alpine
    container_name: agent-orchestration-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - agent-network
      - aegisops-shared

volumes:
  postgres_data:
  redis_data:

# networks:
#   agent-network:
#     driver: bridge

networks:
  agent-network:
    driver: bridge
  aegisops-shared:
    external: true
    name: aegisops-shared