# ===================================
# AegisOps Prometheus Configuration
# ===================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aegisops'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Agent Orchestration Service
  - job_name: 'agent-orchestration'
    static_configs:
      - targets: ['agent-orchestration:9002']
    metrics_path: /metrics

  # Context Management Service
  - job_name: 'context-management'
    static_configs:
      - targets: ['context-management:8000']
    metrics_path: /metrics

  # RAG Service
  - job_name: 'rag'
    static_configs:
      - targets: ['rag:8001']
    metrics_path: /metrics

  # MCP Service
  - job_name: 'mcp'
    static_configs:
      - targets: ['mcp:8005']
    metrics_path: /metrics

  # Observability Service
  - job_name: 'observability'
    static_configs:
      - targets: ['observability:9103']
    metrics_path: /metrics

  # User Management Service
  - job_name: 'user-management'
    static_configs:
      - targets: ['user-management:8004']
    metrics_path: /metrics
